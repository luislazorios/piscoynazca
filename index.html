<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entre Pisco y Nazca | Banquetería para matrimonios y eventos</title>
  <meta name="description" content="Banquetería-Buffet casual para matrimonios y eventos inspirada en gastronomía peruana, del Perú para el mundo." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --text-3xl: clamp(2.5rem, 1rem + 4vw, 5rem);

      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --space-20: 5rem;
      --space-24: 6rem;

      --color-bg: #f7f2ee;
      --color-surface: #fcf8f4;
      --color-surface-2: #fffdfb;
      --color-surface-offset: #efe4dc;
      --color-border: rgba(58, 42, 35, 0.12);
      --color-text: #2f241f;
      --color-text-muted: #7f6d65;
      --color-text-faint: #b7a7a0;
      --color-primary: #8c5f52;
      --color-primary-hover: #74493d;
      --color-highlight: #e9d8cf;
      --color-text-inverse: #fffaf6;
      --shadow-sm: 0 8px 25px rgba(67, 42, 31, 0.07);
      --shadow-lg: 0 20px 50px rgba(67, 42, 31, 0.12);
      --radius-sm: 0.5rem;
      --radius-md: 0.9rem;
      --radius-lg: 1.4rem;
      --radius-xl: 2rem;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Manrope', Arial, sans-serif;
      --content: 1180px;
    }

    [data-theme="dark"] {
      --color-bg: #191514;
      --color-surface: #201b19;
      --color-surface-2: #26211f;
      --color-surface-offset: #2d2522;
      --color-border: rgba(255, 240, 230, 0.12);
      --color-text: #f3e7df;
      --color-text-muted: #c4b2a8;
      --color-text-faint: #8b7a73;
      --color-primary: #d3a796;
      --color-primary-hover: #e4bbac;
      --color-highlight: #342a26;
      --color-text-inverse: #1d1614;
      --shadow-sm: 0 8px 25px rgba(0,0,0,0.22);
      --shadow-lg: 0 20px 50px rgba(0,0,0,0.35);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.65;
      color: var(--color-text);
      background: var(--color-bg);
    }
    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; }
    .container {
      width: min(calc(100% - 2rem), var(--content));
      margin-inline: auto;
    }
    .eyebrow {
      font-size: var(--text-xs);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: var(--space-3);
    }
    .section-title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 600;
      line-height: 1.05;
      margin: 0 0 var(--space-4);
    }
    .section-copy {
      color: var(--color-text-muted);
      max-width: 62ch;
    }
    .site-header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(16px);
      background: color-mix(in srgb, var(--color-bg) 84%, transparent);
      border-bottom: 1px solid var(--color-border);
    }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      min-height: 78px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .brand-mark {
      width: 40px;
      height: 40px;
      border: 1px solid var(--color-border);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--color-surface-2);
    }
    .brand-mark svg { width: 22px; height: 22px; }
    .brand-name {
      display: flex;
      flex-direction: column;
      line-height: 1.05;
    }
    .brand-name strong {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 600;
    }
    .brand-name span {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.24em;
      color: var(--color-text-muted);
    }
